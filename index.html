<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APAC Data Centre Transaction Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --primary-blue: #003366;
            --accent-gold: #c5a059;
            --bg-light: #f4f7f9;
            --text-dark: #333;
            --success-green: #2e7d32;
            --source-gray: #455a64;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-light); color: var(--text-dark); margin: 0; padding: 20px; }
        header { text-align: center; padding: 30px 0; background: var(--primary-blue); color: white; border-bottom: 5px solid var(--accent-gold); margin-bottom: 20px; }
        
        .container { max-width: 98%; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .controls { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        
        button, select, a.btn-link { 
            background-color: var(--primary-blue); color: white; border: none; padding: 10px 15px; 
            border-radius: 5px; cursor: pointer; font-weight: bold; transition: background 0.3s; 
            font-size: 1rem; text-decoration: none; display: inline-block; font-family: inherit;
        }
        button:hover, select:hover, a.btn-link:hover { background-color: var(--accent-gold); }
        
        .btn-export { background-color: var(--success-green); margin-left: auto; }
        .btn-export:hover { background-color: #1b5e20; }
        .btn-source { background-color: var(--source-gray); }
        .btn-source:hover { background-color: #263238; }
        
        .filter-label { font-weight: bold; color: var(--primary-blue); }
        .chart-container { width: 100%; height: 350px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        .table-wrapper { overflow-x: auto; }
        
        th { background-color: #eee; color: var(--primary-blue); text-align: left; padding: 12px 10px; font-size: 0.85rem; cursor: pointer; user-select: none; transition: background 0.2s; }
        th:hover { background-color: #d5d5d5; }
        .sort-arrow { margin-left: 5px; font-size: 0.8rem; color: var(--accent-gold); }
        td { padding: 10px; border-bottom: 1px solid #ddd; font-size: 0.85rem; vertical-align: top; }
        tr:hover { background-color: #f9f9f9; }

        .tag { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; display: inline-block; white-space: nowrap; }
        .tag-korea { background: #e3f2fd; color: #1976d2; }
        .tag-hk { background: #fbe9e7; color: #d84315; }
        .tag-australia { background: #e8f5e9; color: #2e7d32; }
        .tag-malaysia { background: #fff3e0; color: #ef6c00; }
        .tag-singapore { background: #f3e5f5; color: #7b1fa2; }
        .tag-japan { background: #ffebee; color: #c62828; }
        .tag-default { background: #eeeeee; color: #333333; }

        .source-link { color: var(--primary-blue); text-decoration: none; font-weight: bold; }
        .source-link:hover { text-decoration: underline; }
        .remarks { color: #555; font-style: italic; max-width: 200px; line-height: 1.4; }
        
        #loadingMsg { text-align: center; font-size: 1.2rem; color: var(--accent-gold); padding: 20px; font-weight: bold; }

        @media (max-width: 1200px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr { margin-bottom: 20px; border: 1px solid #ccc; border-radius: 6px; padding-bottom: 10px;}
            td { border: none; position: relative; padding-left: 35%; padding-top: 10px; min-height: 24px;}
            td:before { position: absolute; top: 10px; left: 15px; width: 30%; font-weight: bold; content: attr(data-label); color: var(--primary-blue); }
            .remarks { max-width: 100%; }
            .btn-export, .btn-source { margin-left: 0; width: 100%; text-align: center; box-sizing: border-box; }
        }
    </style>
</head>
<body>

<header>
    <h1>APAC Data Centre Real Estate</h1>
    <p>Live Database Tracker</p>
</header>

<div class="container">
    
    <div id="loadingMsg">Loading Database...</div>

    <div class="chart-container" style="display:none;" id="chartWrapper">
        <canvas id="transactionChart"></canvas>
    </div>

    <div class="controls" style="display:none;" id="controlsWrapper">
        <span class="filter-label">Filter by Country:</span>
        <select id="regionFilter" onchange="applyFilter()">
            <option value="All">All Regions</option>
            <option value="South Korea">South Korea</option>
            <option value="Hong Kong">Hong Kong</option>
            <option value="Australia">Australia</option>
            <option value="Malaysia">Malaysia</option>
            <option value="Singapore">Singapore</option>
            <option value="Japan">Japan</option>
        </select>

        <button class="btn-export" onclick="exportToCSV()">💾 Export Filtered View</button>
        <a href="transactions.csv" download="APAC_DC_Master_Database.csv" class="btn-link btn-source">📥 Download Source CSV</a>
    </div>

    <div class="table-wrapper" style="display:none;" id="tableWrapper">
        <table>
            <thead>
                <tr>
                    <th onclick="sortTable('region')">Region <span id="arrow-region" class="sort-arrow"></span></th>
                    <th onclick="sortTable('asset')">Asset / Project <span id="arrow-asset" class="sort-arrow"></span></th>
                    <th onclick="sortTable('buyer')">Buyer / Investor <span id="arrow-buyer" class="sort-arrow"></span></th>
                    <th onclick="sortTable('seller')">Seller / Developer <span id="arrow-seller" class="sort-arrow"></span></th>
                    <th onclick="sortTable('gfa')">GFA (sqm) <span id="arrow-gfa" class="sort-arrow"></span></th>
                    <th onclick="sortTable('capacity')">Capacity (MW) <span id="arrow-capacity" class="sort-arrow"></span></th>
                    <th onclick="sortTable('price')">Consideration (USD Millions) <span id="arrow-price" class="sort-arrow"></span></th>
                    <th onclick="sortTable('dateVal')">Date <span id="arrow-dateVal" class="sort-arrow"></span></th>
                    <th>Remarks</th>
                    <th>Direct Article Source</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    let data = [];
    let chartInstance = null;
    let currentFilter = "All";
    let sortColumn = "dateVal";
    let sortAscending = false; 

    // --- CSV LOADING LOGIC ---
    Papa.parse("transactions.csv", {
        download: true,
        header: true, 
        skipEmptyLines: true,
        complete: function(results) {
            document.getElementById('loadingMsg').style.display = 'none';
            document.getElementById('chartWrapper').style.display = 'block';
            document.getElementById('controlsWrapper').style.display = 'flex';
            document.getElementById('tableWrapper').style.display = 'block';

            data = results.data.map(row => {
                let tagClass = "tag-default";
                if (row.Region === "South Korea") tagClass = "tag-korea";
                else if (row.Region === "Hong Kong") tagClass = "tag-hk";
                else if (row.Region === "Australia") tagClass = "tag-australia";
                else if (row.Region === "Malaysia") tagClass = "tag-malaysia";
                else if (row.Region === "Singapore") tagClass = "tag-singapore";
                else if (row.Region === "Japan") tagClass = "tag-japan";

                return {
                    region: row.Region || "-",
                    class: tagClass,
                    asset: row.Asset || "-",
                    buyer: row.Buyer || "-",
                    seller: row.Seller || "-",
                    gfa: parseFloat(row.GFA_sqm) || 0, 
                    capacity: parseFloat(row.Capacity_MW) || 0, 
                    price: parseFloat(row.Consideration_USD_Millions) || 0, 
                    dateStr: row.Date || "-",
                    dateVal: row.Date ? new Date(row.Date) : new Date(0), 
                    remarks: row.Remarks || "-",
                    source: row.Source || "-",
                    link: row.URL || "#"
                };
            });

            sortTable('dateVal'); 
            renderChart(); 
        },
        error: function(err) {
            document.getElementById('loadingMsg').innerHTML = "⚠️ Error loading transactions.csv. Make sure the headers match exactly: Region,Asset,Buyer,Seller,GFA_sqm,Capacity_MW,Consideration_USD_Millions,Date,Remarks,Source,URL";
            document.getElementById('loadingMsg').style.color = "red";
        }
    });

    // --- FILTERING & SORTING ---
    function applyFilter() {
        currentFilter = document.getElementById("regionFilter").value;
        renderTable();
        renderChart();
    }

    function sortTable(column) {
        if (sortColumn === column) {
            sortAscending = !sortAscending;
        } else {
            sortColumn = column;
            sortAscending = false; 
        }
        data.sort((a, b) => {
            let valA = a[column];
            let valB = b[column];
            if (typeof valA === 'string') {
                return sortAscending ? valA.localeCompare(valB) : valB.localeCompare(valA);
            } else {
                return sortAscending ? valA - valB : valB - valA;
            }
        });
        updateSortArrows();
        renderTable();
    }

    function updateSortArrows() {
        document.querySelectorAll('.sort-arrow').forEach(span => span.innerHTML = "");
        const arrowSpan = document.getElementById(`arrow-${sortColumn}`);
        if (arrowSpan) { arrowSpan.innerHTML = sortAscending ? " ▲" : " ▼"; }
    }

    // --- HTML GENERATION ---
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ""; 
        let displayData = currentFilter === "All" ? data : data.filter(item => item.region === currentFilter);
        
        displayData.forEach(item => {
            // Auto-append the units for display!
            let displayGFA = item.gfa > 0 ? item.gfa.toLocaleString() + " sqm" : "-";
            let displayCap = item.capacity > 0 ? item.capacity + " MW" : "-";
            let displayPrice = item.price > 0 ? "USD " + item.price.toLocaleString() + "M" : "Undisclosed";

            const row = `<tr>
                <td data-label="Region"><span class="tag ${item.class}">${item.region}</span></td>
                <td data-label="Asset / Project"><strong>${item.asset}</strong></td>
                <td data-label="Buyer / Investor">${item.buyer}</td>
                <td data-label="Seller / Developer">${item.seller}</td>
                <td data-label="GFA (sqm)">${displayGFA}</td>
                <td data-label="Capacity (MW)">${displayCap}</td>
                <td data-label="Consideration (USD Millions)">${displayPrice}</td>
                <td data-label="Date">${item.dateStr}</td>
                <td data-label="Remarks" class="remarks">${item.remarks}</td>
                <td data-label="Direct Article Source"><a href="${item.link}" class="source-link" target="_blank">${item.source}</a></td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    function renderChart() {
        const ctx = document.getElementById('transactionChart').getContext('2d');
        let displayData = currentFilter === "All" ? data : data.filter(item => item.region === currentFilter);
        
        const regionTotals = {};
        displayData.forEach(d => {
            if (d.price > 0) { 
                if (!regionTotals[d.region]) { regionTotals[d.region] = 0; }
                regionTotals[d.region] += d.price;
            }
        });
        const sortedRegions = Object.keys(regionTotals).sort((a, b) => regionTotals[b] - regionTotals[a]);
        const values = sortedRegions.map(region => regionTotals[region]);
        
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: sortedRegions,
                datasets: [{
                    label: 'Total Consideration Tracked (USD Millions)',
                    data: values,
                    backgroundColor: ['#003366', '#c5a059', '#1976d2', '#2e7d32', '#d84315', '#7b1fa2'],
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: true } },
                scales: { y: { beginAtZero: true, title: { display: true, text: 'USD Millions' } } }
            }
        });
    }

    function exportToCSV() {
        let csvRows = ["Region,Asset,Buyer,Seller,GFA_sqm,Capacity_MW,Consideration_USD_Millions,Date,Remarks,Source,URL"];
        let displayData = currentFilter === "All" ? data : data.filter(item => item.region === currentFilter);
        displayData.forEach(item => {
            let remarks = item.remarks.replace(/"/g, '""');
            let row = [
                `"${item.region}"`, `"${item.asset}"`, `"${item.buyer}"`, `"${item.seller}"`,
                item.gfa, item.capacity, item.price, `"${item.dateStr}"`,
                `"${remarks}"`, `"${item.source}"`, `"${item.link}"`
            ];
            csvRows.push(row.join(","));
        });
        const blob = new Blob([csvRows.join("\n")], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "APAC_DC_Tracker_Export.csv";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
