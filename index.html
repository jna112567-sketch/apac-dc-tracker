<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APAC Data Centre Transaction Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-blue: #003366;
            --accent-gold: #c5a059;
            --bg-light: #f4f7f9;
            --text-dark: #333;
            --success-green: #2e7d32;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-light); color: var(--text-dark); margin: 0; padding: 20px; }
        header { text-align: center; padding: 30px 0; background: var(--primary-blue); color: white; border-bottom: 5px solid var(--accent-gold); margin-bottom: 20px; }
        
        .container { max-width: 98%; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .controls { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        button, select { background-color: var(--primary-blue); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: background 0.3s; font-size: 1rem; }
        button:hover, select:hover { background-color: var(--accent-gold); }
        
        #btn-unify { background-color: #d84315; }
        #btn-unify:hover { background-color: #bf360c; }
        
        .btn-export { background-color: var(--success-green); margin-left: auto; }
        .btn-export:hover { background-color: #1b5e20; }
        
        .filter-label { font-weight: bold; color: var(--primary-blue); }
        .chart-container { width: 100%; height: 350px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        .table-wrapper { overflow-x: auto; }
        
        th { background-color: #eee; color: var(--primary-blue); text-align: left; padding: 12px 10px; font-size: 0.85rem; cursor: pointer; user-select: none; transition: background 0.2s; }
        th:hover { background-color: #d5d5d5; }
        .sort-arrow { margin-left: 5px; font-size: 0.8rem; color: var(--accent-gold); }

        td { padding: 10px; border-bottom: 1px solid #ddd; font-size: 0.85rem; vertical-align: top; }
        tr:hover { background-color: #f9f9f9; }

        .tag { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; display: inline-block; white-space: nowrap; }
        .tag-korea { background: #e3f2fd; color: #1976d2; }
        .tag-hk { background: #fbe9e7; color: #d84315; }
        .tag-australia { background: #e8f5e9; color: #2e7d32; }
        .tag-malaysia { background: #fff3e0; color: #ef6c00; }
        .tag-singapore { background: #f3e5f5; color: #7b1fa2; }
        .tag-japan { background: #ffebee; color: #c62828; }

        .source-link { color: var(--primary-blue); text-decoration: none; font-weight: bold; }
        .source-link:hover { text-decoration: underline; }
        .remarks { color: #555; font-style: italic; max-width: 200px; line-height: 1.4; }

        @media (max-width: 1200px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr { margin-bottom: 20px; border: 1px solid #ccc; border-radius: 6px; padding-bottom: 10px;}
            td { border: none; position: relative; padding-left: 35%; padding-top: 10px; min-height: 24px;}
            td:before { position: absolute; top: 10px; left: 15px; width: 30%; font-weight: bold; content: attr(data-label); color: var(--primary-blue); }
            .remarks { max-width: 100%; }
            .btn-export { margin-left: 0; width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <h1>APAC Data Centre Real Estate</h1>
    <p>Interactive Transaction Tracker (Live Verified URLs)</p>
</header>

<div class="container">
    
    <div class="chart-container">
        <canvas id="transactionChart"></canvas>
    </div>

    <div class="controls">
        <button id="btn-unify" onclick="toggleUnify()">🔄 Unify Units (USD & Sqm)</button>
        
        <span class="filter-label">Filter by Country:</span>
        <select id="regionFilter" onchange="applyFilter()">
            <option value="All">All Regions</option>
            <option value="South Korea">South Korea</option>
            <option value="Hong Kong">Hong Kong</option>
            <option value="Australia">Australia</option>
            <option value="Malaysia">Malaysia</option>
            <option value="Singapore">Singapore</option>
            <option value="Japan">Japan</option>
        </select>

        <button class="btn-export" onclick="exportToCSV()">💾 Export to CSV</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th onclick="sortTable('region')">Region <span id="arrow-region" class="sort-arrow"></span></th>
                    <th onclick="sortTable('asset')">Asset / Project <span id="arrow-asset" class="sort-arrow"></span></th>
                    <th onclick="sortTable('buyer')">Buyer / Investor <span id="arrow-buyer" class="sort-arrow"></span></th>
                    <th onclick="sortTable('seller')">Seller / Developer <span id="arrow-seller" class="sort-arrow"></span></th>
                    <th onclick="sortTable('gfaSqm')">GFA <span id="arrow-gfaSqm" class="sort-arrow"></span></th>
                    <th>Capacity</th>
                    <th onclick="sortTable('usdPrice')">Consideration <span id="arrow-usdPrice" class="sort-arrow"></span></th>
                    <th onclick="sortTable('dateVal')">Date <span id="arrow-dateVal" class="sort-arrow"></span></th>
                    <th>Remarks</th>
                    <th>Direct Article Source</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    // --- 1. FULL 20-PROPERTY DATABASE WITH LIVE LINKS & FALLBACK QUERIES ---
    let data = [
        // SOUTH KOREA
        { region: "South Korea", class: "tag-korea", asset: "Ansan Hyperscale Platform", buyer: "Macquarie / Gabia (JV)", seller: "-", gfaOrig: "-", gfaSqm: 0, capacity: "100 MW+", localPrice: "KRW 600B", usdPrice: 420.0, dateStr: "Mar 2026", dateVal: new Date("2026-03-03"), remarks: "Strategic AI infrastructure hub partnership.", source: "Macquarie", link: "https://www.macquarie.com/au/en/about/news/2026/macquarie-asset-management-and-gabia-form-strategic-partnership-to-develop-next-generation-hyperscale-data-centre-platform-in-south-korea.html" },
        { region: "South Korea", class: "tag-korea", asset: "Hanam Data Centre", buyer: "Macquarie (MKIF)", seller: "IGIS Asset Management", gfaOrig: "41,919 sqm", gfaSqm: 41919, capacity: "40 MW", localPrice: "KRW 734B", usdPrice: 543.7, dateStr: "Aug 2024", dateVal: new Date("2024-08-01"), remarks: "En-bloc acquisition. LG CNS anchor.", source: "Macquarie", link: "https://www.macquarie.com/au/en/about/news/2024/macquarie-asset-management-acquires-hanam-data-centre-in-korea.html" },
        { region: "South Korea", class: "tag-korea", asset: "Incheon Data Centre", buyer: "ESR / Princeton DG", seller: "-", gfaOrig: "11,000 sqm", gfaSqm: 11000, capacity: "48 MW", localPrice: "USD 700M", usdPrice: 700.0, dateStr: "Nov 2025", dateVal: new Date("2025-11-01"), remarks: "First Korean DC project for ESR and PDG.", source: "Mingtiandi", link: "https://www.mingtiandi.com/real-estate/data-centres/esr-princeton-digital-group-enter-korean-data-centre-market-with-700m-incheon-project/" },
        { region: "South Korea", class: "tag-korea", asset: "SK Group AI DC Stake", buyer: "KKR (Potential)", seller: "SK Group", gfaOrig: "-", gfaSqm: 0, capacity: "103 MW", localPrice: "KRW 2 Trillion", usdPrice: 1400.0, dateStr: "Dec 2025", dateVal: new Date("2025-12-15"), remarks: "Seeking to sell up to 49% stake.", source: "KED Global", link: "https://www.kedglobal.com/artificial-intelligence/newsView/ked202512150002" },
        { region: "South Korea", class: "tag-korea", asset: "Shinsegae AI Data Center", buyer: "Shinsegae / Reflection AI", seller: "-", gfaOrig: "-", gfaSqm: 0, capacity: "250 MW", localPrice: "Undisclosed", usdPrice: 0, dateStr: "Mar 2026", dateVal: new Date("2026-03-17"), remarks: "Retail giant building Korea's largest AI DC.", source: "Korea Times", link: "https://www.google.com/search?q=Shinsegae+Reflection+AI+Data+Center+Korea+Times" },
        { region: "South Korea", class: "tag-korea", asset: "Yongin City Hyperscale", buyer: "Warburg Pincus", seller: "DC Connects", gfaOrig: "58,000 sqm", gfaSqm: 58000, capacity: "80 MW", localPrice: "Undisclosed", usdPrice: 0, dateStr: "Sep 2025", dateVal: new Date("2025-09-01"), remarks: "Greenfield land acquisition for liquid-cooling.", source: "Warburg Pincus", link: "https://warburgpincus.com/2025/09/25/warburg-pincus-partners-with-dc-connects/" },

        // HONG KONG 
        { region: "Hong Kong", class: "tag-hk", asset: "Fanling Data Centres", buyer: "Actis (Advanced Talks)", seller: "Grand Ming Group", gfaOrig: "Two Assets", gfaSqm: 17187, capacity: "16 MW", localPrice: "HKD 5.25B", usdPrice: 676.0, dateStr: "Oct 2025", dateVal: new Date("2025-10-21"), remarks: "Actis nearing deal after Bain exclusivity lapsed.", source: "Mingtiandi", link: "https://www.mingtiandi.com/real-estate/data-centres/actis-nears-deal-to-buy-676m-in-hong-kong-data-centres-from-grand-ming/" },
        { region: "Hong Kong", class: "tag-hk", asset: "Equinix HK6 Data Centre", buyer: "Equinix", seller: "-", gfaOrig: "17-Story Site", gfaSqm: 0, capacity: "3,550 cabinets", localPrice: "USD 124M", usdPrice: 124.0, dateStr: "Aug 2024", dateVal: new Date("2024-08-13"), remarks: "Purpose-built site for AI workloads; liquid cooling.", source: "Equinix", link: "https://newsroom.equinix.com/2024-08-12-Equinix-Expands-Hong-Kongs-Footprint-with-124M-Data-Center-Investment" },
        { region: "Hong Kong", class: "tag-hk", asset: "Goodman HK Partnership", buyer: "Goodman Group (JV)", seller: "-", gfaOrig: "2.3M sq ft", gfaSqm: 213677, capacity: "180 MW", localPrice: "USD 2.7B", usdPrice: 2700.0, dateStr: "Jul 2025", dateVal: new Date("2025-07-01"), remarks: "Major institutional investment vehicle.", source: "Goodman", link: "https://us.goodman.com/about-goodman/media-center/latest-news/2025/goodman-launches-major-hong-kong-data-centre-partnership" },
        { region: "Hong Kong", class: "tag-hk", asset: "Tsing Yi Data Center", buyer: "Global Engine", seller: "Undisclosed", gfaOrig: "Colocation", gfaSqm: 0, capacity: "Colocation", localPrice: "HKD 17.5M", usdPrice: 2.25, dateStr: "Dec 2024", dateVal: new Date("2024-12-01"), remarks: "Acquisition to capture Greater Bay Area demand.", source: "Global Engine", link: "https://ir.globalengine.com.hk/pressreleases/detail/ce881848-1a6b-4612-83ae-0699619858da" },
        { region: "Hong Kong", class: "tag-hk", asset: "Kwai Chung Hyperscale", buyer: "BDx", seller: "Clifford Capital (Lender)", gfaOrig: "12,000 sqm", gfaSqm: 12000, capacity: "16 MW", localPrice: "Project Finance", usdPrice: 0, dateStr: "May 2025", dateVal: new Date("2025-05-01"), remarks: "Secured major project financing.", source: "W.Media", link: "https://w.media/bdx-raises-funds-for-hong-kong-dc/" },
        { region: "Hong Kong", class: "tag-hk", asset: "MEGA Plus Expansion", buyer: "SUNeVision", seller: "-", gfaOrig: "474,000 sq ft", gfaSqm: 44036, capacity: "High Density", localPrice: "Undisclosed", usdPrice: 0, dateStr: "Mar 2024", dateVal: new Date("2024-03-01"), remarks: "Power upgrades and expansion for generative AI.", source: "News Search", link: "https://www.google.com/search?q=SUNeVision+MEGA+Plus+expansion+2024" },
        { region: "Hong Kong", class: "tag-hk", asset: "TKO Cloud Provider Lease", buyer: "Undisclosed Cloud Provider", seller: "Undisclosed Operator", gfaOrig: "-", gfaSqm: 0, capacity: "Major Capacity", localPrice: "Undisclosed", usdPrice: 0, dateStr: "H1 2025", dateVal: new Date("2025-03-01"), remarks: "Major commitment by a cloud service provider.", source: "News Search", link: "https://www.google.com/search?q=Hong+Kong+Data+Centre+Market+TKO+Cloud+Lease+2025" },
        
        // WIDER APAC
        { region: "Australia", class: "tag-australia", asset: "AirTrunk Platform", buyer: "Blackstone / CPPIB", seller: "Macquarie / PSP", gfaOrig: "Multiple", gfaSqm: 0, capacity: "800 MW", localPrice: "AUD 24B", usdPrice: 16100.0, dateStr: "Sep 2024", dateVal: new Date("2024-09-01"), remarks: "Largest data centre transaction globally.", source: "Blackstone", link: "https://www.blackstone.com/news/press/blackstone-and-cpp-investments-to-acquire-airtrunk-for-a24-billion/" },
        { region: "Malaysia", class: "tag-malaysia", asset: "Yondr Johor Campus", buyer: "Vantage Data Centers", seller: "-", gfaOrig: "73 acres", gfaSqm: 295420, capacity: "300 MW", localPrice: "USD 1.6B", usdPrice: 1600.0, dateStr: "Sep 2025", dateVal: new Date("2025-09-01"), remarks: "Backed by GIC and ADIA.", source: "Vantage DC", link: "https://vantage-dc.com/news/vantage-data-centers-secures-1-6b-investment-in-apac-platform-from-gic-and-adia/" },
        { region: "Singapore", class: "tag-singapore", asset: "ST Telemedia Global", buyer: "KKR / Singtel", seller: "ST Telemedia", gfaOrig: "Multiple", gfaSqm: 0, capacity: "1.7 GW", localPrice: "SGD 1.75B", usdPrice: 1300.0, dateStr: "Jun 2024", dateVal: new Date("2024-06-01"), remarks: "Platform investment via preference shares.", source: "Singtel", link: "https://www.singtel.com/about-us/media-centre/news-releases/kkr-led-consortium-with-singtel-group-to-fully-acquire-st-telemedia-global-data-centres" },
        { region: "Japan", class: "tag-japan", asset: "Ascendas REIT Hyperscale", buyer: "CapitaLand Ascendas", seller: "Undisclosed", gfaOrig: "15,000 sqm", gfaSqm: 15000, capacity: "Hyperscale", localPrice: "SGD 1.4B", usdPrice: 1040.0, dateStr: "Mar 2026", dateVal: new Date("2026-03-01"), remarks: "Entry into Japan alongside 2 Singapore assets.", source: "CapitaLand", link: "https://www.capitaland.com/en/about-capitaland/newsroom/news-releases/international/2026/march/capitaland-ascendas-reit-acquires-two-assets-in-Singapore-and-enters-Japan-with-a-hyperscale-data-centre.html" },
        { region: "Malaysia", class: "tag-malaysia", asset: "GDS Holdings Johor Phase 2", buyer: "GDS Holdings", seller: "-", gfaOrig: "20,000 sqm", gfaSqm: 20000, capacity: "100 MW+", localPrice: "USD 800M", usdPrice: 800.0, dateStr: "Jan 2025", dateVal: new Date("2025-01-01"), remarks: "Expansion in the Nusajaya Tech Park.", source: "W.Media", link: "https://w.media/north-east-asia-data-center-market-enters-ai-driven-growth-phase/" },
        { region: "Japan", class: "tag-japan", asset: "Saitama Campus", buyer: "Princeton Digital Group", seller: "-", gfaOrig: "33,000 sqm", gfaSqm: 33000, capacity: "96 MW", localPrice: "USD 1.0B", usdPrice: 1000.0, dateStr: "Mid 2024", dateVal: new Date("2024-06-15"), remarks: "Major investment in Greater Tokyo.", source: "Princeton DG", link: "https://princetondg.com/pdg-unveils-1-billion-96mw-data-center-campus-in-tokyo/" }
    ];

    let isUnified = false; 
    let chartInstance = null;
    let currentFilter = "All";
    let sortColumn = "dateVal";
    let sortAscending = false; 

    function formatConsideration(item) {
        if (item.usdPrice === 0) return "Undisclosed";
        if (isUnified) {
            if (item.usdPrice >= 1000) {
                return `USD ${(item.usdPrice / 1000).toFixed(1)}B`;
            } else {
                return `USD ${item.usdPrice}M`;
            }
        } else {
            return item.localPrice;
        }
    }

    function formatGFA(item) {
        if (isUnified) {
            return item.gfaSqm > 0 ? item.gfaSqm.toLocaleString() + " sqm" : "-";
        } else {
            return item.gfaOrig;
        }
    }

    function toggleUnify() {
        isUnified = !isUnified;
        const btn = document.getElementById('btn-unify');
        if(isUnified) {
            btn.innerHTML = "🔙 Revert to Local Units";
            btn.style.backgroundColor = "#bf360c";
        } else {
            btn.innerHTML = "🔄 Unify Units (USD & Sqm)";
            btn.style.backgroundColor = "#d84315";
        }
        renderTable(); 
    }

    function exportToCSV() {
        let csvRows = [];
        csvRows.push("Region,Asset / Project,Buyer / Investor,Seller / Developer,GFA,Capacity,Consideration,Date,Remarks,Source,Direct_URL");
        let displayData = currentFilter === "All" ? data : data.filter(item => item.region === currentFilter);
        displayData.forEach(item => {
            let priceText = formatConsideration(item);
            let gfaText = formatGFA(item);
            let row = [
                `"${item.region}"`, `"${item.asset}"`, `"${item.buyer}"`, `"${item.seller}"`,
                `"${gfaText}"`, `"${item.capacity}"`, `"${priceText}"`, `"${item.dateStr}"`,
                `"${item.remarks}"`, `"${item.source}"`, `"${item.link}"`
            ];
            csvRows.push(row.join(","));
        });
        const csvString = csvRows.join("\n");
        const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", "APAC_DC_Transactions.csv");
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function applyFilter() {
        currentFilter = document.getElementById("regionFilter").value;
        renderTable();
        renderChart();
    }

    function sortTable(column) {
        if (sortColumn === column) {
            sortAscending = !sortAscending;
        } else {
            sortColumn = column;
            sortAscending = false; 
        }
        data.sort((a, b) => {
            let valA = a[column];
            let valB = b[column];
            if (typeof valA === 'string') {
                return sortAscending ? valA.localeCompare(valB) : valB.localeCompare(valA);
            } else {
                return sortAscending ? valA - valB : valB - valA;
            }
        });
        updateSortArrows();
        renderTable();
    }

    function updateSortArrows() {
        document.querySelectorAll('.sort-arrow').forEach(span => span.innerHTML = "");
        const arrowSpan = document.getElementById(`arrow-${sortColumn}`);
        if (arrowSpan) { arrowSpan.innerHTML = sortAscending ? " ▲" : " ▼"; }
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ""; 
        let displayData = currentFilter === "All" ? data : data.filter(item => item.region === currentFilter);
        displayData.forEach(item => {
            const row = `<tr>
                <td data-label="Region"><span class="tag ${item.class}">${item.region}</span></td>
                <td data-label="Asset / Project"><strong>${item.asset}</strong></td>
                <td data-label="Buyer / Investor">${item.buyer}</td>
                <td data-label="Seller / Developer">${item.seller}</td>
                <td data-label="GFA">${formatGFA(item)}</td>
                <td data-label="Capacity">${item.capacity}</td>
                <td data-label="Consideration">${formatConsideration(item)}</td>
                <td data-label="Date">${item.dateStr}</td>
                <td data-label="Remarks" class="remarks">${item.remarks}</td>
                <td data-label="Direct Source"><a href="${item.link}" class="source-link" target="_blank">${item.source}</a></td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    function renderChart() {
        const ctx = document.getElementById('transactionChart').getContext('2d');
        let displayData = currentFilter === "All" ? data : data.filter(item => item.region === currentFilter);
        const regionTotals = {};
        displayData.forEach(d => {
            if (d.usdPrice > 0) { 
                if (!regionTotals[d.region]) { regionTotals[d.region] = 0; }
                regionTotals[d.region] += d.usdPrice;
            }
        });
        const sortedRegions = Object.keys(regionTotals).sort((a, b) => regionTotals[b] - regionTotals[a]);
        const values = sortedRegions.map(region => regionTotals[region]);
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: sortedRegions,
                datasets: [{
                    label: 'Total Consideration (USD Millions)',
                    data: values,
                    backgroundColor: ['#003366', '#c5a059', '#1976d2', '#2e7d32', '#d84315', '#7b1fa2'],
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: true } },
                scales: { y: { beginAtZero: true, title: { display: true, text: 'USD Millions' } } }
            }
        });
    }

    sortTable('dateVal'); 
    renderChart(); 
</script>

</body>
</html>
